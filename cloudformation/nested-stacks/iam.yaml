AWSTemplateFormatVersion: "2010-09-09"
Description: Child stack - IAM role and instance profile for EC2

Resources:
  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: nested-ec2-role

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2Role

Outputs:
  InstanceProfileName:
    Value: !Ref Ec2InstanceProfile
  RoleArn:
    Value: !GetAtt Ec2Role.Arn
